<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Big Launch — Countdown</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root{
    --sunburst:#FFD23F;
    --flamingo:#FF4E9E;
    --violet:#6C1FA8;
    --ink:#1A1445;
    --mint:#06D6A0;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0;
    height:100%;
    background:
      radial-gradient(circle at 15% 20%, rgba(255,210,63,.35), transparent 40%),
      radial-gradient(circle at 85% 80%, rgba(6,214,160,.30), transparent 45%),
      linear-gradient(140deg, var(--violet) 0%, var(--ink) 55%, var(--flamingo) 130%);
    font-family:'Inter', sans-serif;
    color:#fff;
    overflow:hidden;
  }
  .shape{
    position:absolute;
    border-radius:50%;
    filter:blur(1px);
    opacity:.55;
    animation:drift 14s ease-in-out infinite;
  }
  @keyframes drift{
    0%,100%{ transform:translateY(0) translateX(0) rotate(0deg); }
    50%{ transform:translateY(-30px) translateX(20px) rotate(20deg); }
  }
  .shape:nth-child(1){ width:70px; height:70px; background:var(--sunburst); top:10%; left:8%; animation-duration:11s; }
  .shape:nth-child(2){ width:40px; height:40px; background:var(--mint); top:70%; left:14%; animation-duration:9s; }
  .shape:nth-child(3){ width:100px; height:100px; background:var(--flamingo); top:20%; right:10%; animation-duration:16s; }
  .shape:nth-child(4){ width:55px; height:55px; background:var(--sunburst); bottom:12%; right:18%; animation-duration:13s; }
  .shape:nth-child(5){ width:26px; height:26px; background:#fff; top:45%; left:50%; animation-duration:8s; opacity:.3; }

  .stage{
    position:relative;
    height:100%;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:24px;
    text-align:center;
  }

  .eyebrow{
    font-family:'Space Grotesk', sans-serif;
    font-weight:500;
    letter-spacing:.35em;
    text-transform:uppercase;
    font-size:clamp(11px, 1.6vw, 14px);
    color:var(--sunburst);
    margin-bottom:14px;
  }

  h1{
    font-family:'Space Grotesk', sans-serif;
    font-weight:700;
    font-size:clamp(28px, 6vw, 64px);
    margin:0 0 8px;
    line-height:1.05;
  }
  h1 span{
    background:linear-gradient(90deg, var(--sunburst), var(--flamingo));
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
  }

  .subtext{
    font-size:clamp(13px, 1.8vw, 16px);
    color:rgba(255,255,255,.75);
    margin-bottom:48px;
    max-width:480px;
  }

  .grid{
    display:flex;
    gap:clamp(10px, 2.4vw, 28px);
    flex-wrap:wrap;
    justify-content:center;
  }

  .unit{
    background:rgba(255,255,255,.08);
    border:1px solid rgba(255,255,255,.18);
    backdrop-filter:blur(6px);
    border-radius:18px;
    padding:clamp(14px,2.6vw,26px) clamp(12px,2.8vw,28px);
    min-width:clamp(72px, 14vw, 130px);
    box-shadow:0 12px 40px rgba(0,0,0,.25);
  }

  .num{
    font-family:'Space Grotesk', sans-serif;
    font-weight:700;
    font-size:clamp(32px, 7vw, 64px);
    line-height:1;
    font-variant-numeric:tabular-nums;
    transition:transform .25s ease;
  }
  .num.tick{
    animation:pop .35s ease;
  }
  @keyframes pop{
    0%{ transform:scale(1); }
    40%{ transform:scale(1.18); color:var(--sunburst); }
    100%{ transform:scale(1); }
  }

  .label{
    font-size:clamp(10px, 1.4vw, 13px);
    letter-spacing:.2em;
    text-transform:uppercase;
    color:rgba(255,255,255,.6);
    margin-top:6px;
  }

  .done{
    font-family:'Space Grotesk', sans-serif;
    font-weight:700;
    font-size:clamp(30px, 6vw, 56px);
  }

  .footer-note{
    margin-top:40px;
    font-size:12px;
    color:rgba(255,255,255,.45);
  }

  @media (prefers-reduced-motion: reduce){
    .shape{ animation:none; }
    .num.tick{ animation:none; }
  }
</style>
</head>
<body>

<div class="shape"></div>
<div class="shape"></div>
<div class="shape"></div>
<div class="shape"></div>
<div class="shape"></div>

<div class="stage">
  <div class="eyebrow">Mark your calendar</div>
  <h1>The Big <span>Launch</span></h1>
  <p class="subtext">This is a placeholder countdown — swap the target date in the code for your own event.</p>

  <div class="grid" id="grid">
    <div class="unit"><div class="num" id="days">00</div><div class="label">Days</div></div>
    <div class="unit"><div class="num" id="hours">00</div><div class="label">Hours</div></div>
    <div class="unit"><div class="num" id="minutes">00</div><div class="label">Minutes</div></div>
    <div class="unit"><div class="num" id="seconds">00</div><div class="label">Seconds</div></div>
  </div>

  <div class="footer-note">Counting down to a placeholder date, 30 days from page load</div>
</div>

<script>
  // ---- EDIT THIS to set your real target date/time ----
  // Example: new Date('2026-12-31T23:59:59')
  const target = new Date(Date.now() + 30 * 24 * 60 * 60 * 1000); // placeholder: 30 days from now

  const els = {
    days: document.getElementById('days'),
    hours: document.getElementById('hours'),
    minutes: document.getElementById('minutes'),
    seconds: document.getElementById('seconds'),
  };
  const prev = { days:'', hours:'', minutes:'', seconds:'' };

  function pad(n){ return String(n).padStart(2, '0'); }

  function tick(){
    const now = new Date();
    let diff = target - now;

    if (diff <= 0){
      document.getElementById('grid').innerHTML = '<div class="done">🎉 It\'s here!</div>';
      clearInterval(timer);
      return;
    }

    const days = Math.floor(diff / (1000*60*60*24));
    diff -= days * (1000*60*60*24);
    const hours = Math.floor(diff / (1000*60*60));
    diff -= hours * (1000*60*60);
    const minutes = Math.floor(diff / (1000*60));
    diff -= minutes * (1000*60);
    const seconds = Math.floor(diff / 1000);

    const vals = { days: pad(days), hours: pad(hours), minutes: pad(minutes), seconds: pad(seconds) };

    for (const key in vals){
      if (vals[key] !== prev[key]){
        els[key].textContent = vals[key];
        els[key].classList.remove('tick');
        void els[key].offsetWidth;
        els[key].classList.add('tick');
        prev[key] = vals[key];
      }
    }
  }

  tick();
  const timer = setInterval(tick, 1000);
</script>

</body>
</html>
