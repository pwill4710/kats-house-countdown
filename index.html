<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kat's First House — Closing Countdown 🏡</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root{
    --sunburst:#FFD23F;
    --flamingo:#FF4E9E;
    --violet:#6C1FA8;
    --ink:#1A1445;
    --mint:#06D6A0;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0;
    height:100%;
    background:
      radial-gradient(circle at 15% 20%, rgba(255,210,63,.35), transparent 40%),
      radial-gradient(circle at 85% 80%, rgba(6,214,160,.30), transparent 45%),
      linear-gradient(140deg, var(--violet) 0%, var(--ink) 55%, var(--flamingo) 130%);
    font-family:'Inter', sans-serif;
    color:#fff;
    overflow:hidden;
  }
  .shape{
    position:absolute;
    border-radius:50%;
    filter:blur(1px);
    opacity:.55;
    animation:drift 14s ease-in-out infinite;
  }
  @keyframes drift{
    0%,100%{ transform:translateY(0) translateX(0) rotate(0deg); }
    50%{ transform:translateY(-30px) translateX(20px) rotate(20deg); }
  }
  .shape:nth-child(1){ width:70px; height:70px; background:var(--sunburst); top:10%; left:8%; animation-duration:11s; }
  .shape:nth-child(2){ width:40px; height:40px; background:var(--mint); top:70%; left:14%; animation-duration:9s; }
  .shape:nth-child(3){ width:100px; height:100px; background:var(--flamingo); top:20%; right:10%; animation-duration:16s; }
  .shape:nth-child(4){ width:55px; height:55px; background:var(--sunburst); bottom:12%; right:18%; animation-duration:13s; }
  .shape:nth-child(5){ width:26px; height:26px; background:#fff; top:45%; left:50%; animation-duration:8s; opacity:.3; }

  .stage{
    position:relative;
    height:100%;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:24px;
    text-align:center;
  }

  .eyebrow{
    font-family:'Space Grotesk', sans-serif;
    font-weight:500;
    letter-spacing:.35em;
    text-transform:uppercase;
    font-size:clamp(11px, 1.6vw, 14px);
    color:var(--sunburst);
    margin-bottom:14px;
  }

  h1{
    font-family:'Space Grotesk', sans-serif;
    font-weight:700;
    font-size:clamp(40px, 9vw, 96px);
    margin:0 0 8px;
    line-height:1.05;
  }
  h1 span{
    background:linear-gradient(90deg, var(--sunburst), var(--flamingo));
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
  }

  .subtext{
    font-size:clamp(13px, 1.8vw, 16px);
    color:rgba(255,255,255,.75);
    margin-bottom:48px;
    max-width:480px;
  }

  .grid{
    display:flex;
    gap:clamp(10px, 2.4vw, 28px);
    flex-wrap:wrap;
    justify-content:center;
  }

  .unit{
    background:rgba(255,255,255,.08);
    border:1px solid rgba(255,255,255,.18);
    backdrop-filter:blur(6px);
    border-radius:18px;
    padding:clamp(14px,2.6vw,26px) clamp(12px,2.8vw,28px);
    min-width:clamp(72px, 14vw, 130px);
    box-shadow:0 12px 40px rgba(0,0,0,.25);
  }

  .num{
    font-family:'Space Grotesk', sans-serif;
    font-weight:700;
    font-size:clamp(32px, 7vw, 64px);
    line-height:1;
    font-variant-numeric:tabular-nums;
    transition:transform .25s ease;
  }
  .num.tick{
    animation:pop .35s ease;
  }
  @keyframes pop{
    0%{ transform:scale(1); }
    40%{ transform:scale(1.18); color:var(--sunburst); }
    100%{ transform:scale(1); }
  }

  .label{
    font-size:clamp(10px, 1.4vw, 13px);
    letter-spacing:.2em;
    text-transform:uppercase;
    color:rgba(255,255,255,.6);
    margin-top:6px;
  }

  .done{
    font-family:'Space Grotesk', sans-serif;
    font-weight:700;
    font-size:clamp(26px, 5.5vw, 52px);
  }

  .footer-note{
    margin-top:40px;
    font-size:12px;
    color:rgba(255,255,255,.45);
  }

  @media (prefers-reduced-motion: reduce){
    .shape{ animation:none; }
    .num.tick{ animation:none; }
  }

  .balloon{
    position:absolute;
    bottom:-160px;
    width:56px;
    height:70px;
    border-radius:50% 50% 50% 50% / 58% 58% 42% 42%;
    animation-name:rise;
    animation-timing-function:ease-in;
    animation-fill-mode:forwards;
  }
  .balloon::before{
    content:'';
    position:absolute;
    left:50%;
    top:calc(100% + 8px);
    width:2px;
    height:42px;
    background:rgba(255,255,255,.5);
    transform:translateX(-50%);
  }
  .balloon::after{
    content:'';
    position:absolute;
    left:50%;
    top:100%;
    width:10px;
    height:8px;
    background:inherit;
    clip-path:polygon(50% 100%, 0% 0%, 100% 0%);
    transform:translateX(-50%);
  }
  @keyframes rise{
    0%{ transform:translateY(0) translateX(0) rotate(-4deg); opacity:0; }
    8%{ opacity:1; }
    50%{ transform:translateY(-55vh) translateX(24px) rotate(4deg); }
    100%{ transform:translateY(-120vh) translateX(-18px) rotate(-6deg); opacity:.9; }
  }
  .balloon{ pointer-events:auto; cursor:pointer; }
  .balloon.popping{
    animation:none !important;
    transition:transform .18s ease, opacity .18s ease;
    transform:scale(1.6);
    opacity:0;
  }

  .surprise-msg{
    margin-top:24px;
    font-size:clamp(14px, 2vw, 18px);
    color:var(--sunburst);
    font-weight:600;
    min-height:24px;
    opacity:0;
    transition:opacity 1s ease;
  }
  .surprise-msg.show{ opacity:1; }

  .surprise-btn{
    margin-top:22px;
    font-family:'Space Grotesk', sans-serif;
    font-weight:700;
    font-size:clamp(13px, 1.8vw, 16px);
    letter-spacing:.05em;
    color:var(--ink);
    background:linear-gradient(90deg, var(--sunburst), var(--flamingo));
    border:none;
    border-radius:999px;
    padding:12px 28px;
    cursor:pointer;
    box-shadow:0 10px 30px rgba(0,0,0,.25);
    transition:transform .2s ease, box-shadow .2s ease;
  }
  .surprise-btn:hover{
    transform:translateY(-2px) scale(1.03);
    box-shadow:0 14px 36px rgba(0,0,0,.32);
  }
  .surprise-btn:active{
    transform:translateY(0) scale(.98);
  }

  .surprise-overlay{
    position:fixed;
    inset:0;
    background:rgba(15,10,40,.75);
    backdrop-filter:blur(4px);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
    opacity:0;
    pointer-events:none;
    transition:opacity .3s ease;
    z-index:50;
  }
  .surprise-overlay.show{
    opacity:1;
    pointer-events:auto;
  }
  .surprise-card{
    position:relative;
    max-width:min(420px, 90vw);
    max-height:85vh;
    background:rgba(255,255,255,.06);
    border:1px solid rgba(255,255,255,.18);
    border-radius:24px;
    padding:16px;
    box-shadow:0 24px 60px rgba(0,0,0,.4);
    transform:scale(.9);
    transition:transform .3s ease;
    overflow:hidden;
  }
  .surprise-overlay.show .surprise-card{
    transform:scale(1);
  }
  .surprise-card img{
    display:block;
    width:100%;
    height:auto;
    max-height:70vh;
    object-fit:contain;
    border-radius:16px;
  }
  .surprise-close{
    position:absolute;
    top:10px;
    right:10px;
    width:34px;
    height:34px;
    border-radius:50%;
    border:none;
    background:rgba(0,0,0,.55);
    color:#fff;
    font-size:18px;
    line-height:1;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .surprise-close:hover{ background:rgba(0,0,0,.75); }
</style>
</head>

<script>
  // Closing day — change the time if you know the exact appointment hour
  const target = new Date('2026-07-20T09:00:00');

  const els = {
    days: document.getElementById('days'),
    hours: document.getElementById('hours'),
    minutes: document.getElementById('minutes'),
    seconds: document.getElementById('seconds'),
  };
  const prev = { days:'', hours:'', minutes:'', seconds:'' };

  function pad(n){ return String(n).padStart(2, '0'); }

  function tick(){
    const now = new Date();
    let diff = target - now;

    if (diff <= 0){
      document.getElementById('grid').innerHTML = '<div class="done">🏡🎉 Welcome home, Kat!</div>';
      clearInterval(timer);
      bigCelebration();
      return;
    }

    const days = Math.floor(diff / (1000*60*60*24));
    diff -= days * (1000*60*60*24);
    const hours = Math.floor(diff / (1000*60*60));
    diff -= hours * (1000*60*60);
    const minutes = Math.floor(diff / (1000*60));
    diff -= minutes * (1000*60);
    const seconds = Math.floor(diff / 1000);

    const vals = { days: pad(days), hours: pad(hours), minutes: pad(minutes), seconds: pad(seconds) };

    for (const key in vals){
      if (vals[key] !== prev[key]){
        els[key].textContent = vals[key];
        els[key].classList.remove('tick');
        void els[key].offsetWidth;
        els[key].classList.add('tick');
        prev[key] = vals[key];
      }
    }
  }

  tick();
  const timer = setInterval(tick, 1000);

  // ---- Balloons ----
  const balloonLayer = document.getElementById('balloon-layer');
  const balloonColors = ['#FFD23F', '#FF4E9E', '#6C1FA8', '#06D6A0', '#FF7A5C'];

  function spawnBalloon(opts = {}) {
    const b = document.createElement('div');
    b.className = 'balloon';
    const color = opts.color || balloonColors[Math.floor(Math.random() * balloonColors.length)];
    const size = opts.size || (46 + Math.random() * 30);
    const duration = opts.duration || (7 + Math.random() * 4);
    const left = opts.left != null ? opts.left : Math.random() * 92;

    b.style.background = `radial-gradient(circle at 32% 28%, rgba(255,255,255,.55), ${color} 60%)`;
    b.style.left = left + '%';
    b.style.width = size + 'px';
    b.style.height = (size * 1.25) + 'px';
    b.style.animationDuration = duration + 's';

    balloonLayer.appendChild(b);
    setTimeout(() => b.remove(), duration * 1000 + 200);

    b.addEventListener('click', () => popBalloon(b));
  }

  // a few balloons drifting up on load
  for (let i = 0; i < 4; i++) {
    setTimeout(() => spawnBalloon(), i * 500);
  }

  // gentle ambient balloon every few seconds
  setInterval(() => spawnBalloon(), 3200);

  function bigCelebration() {
    for (let i = 0; i < 30; i++) {
      setTimeout(() => spawnBalloon({ duration: 6 + Math.random() * 3 }), i * 120);
    }
  }

  function popBalloon(b) {
    if (b.classList.contains('popping')) return;
    b.classList.add('popping');
    playPop();
    setTimeout(() => b.remove(), 200);
  }

  // ---- Synthesized pop sound (no external files needed) ----
  let audioCtx;
  function getAudioCtx() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    return audioCtx;
  }

  function playPop() {
    const ctx = getAudioCtx();
    const now = ctx.currentTime;

    // Quick pitch-drop "pop" tone
    const osc = ctx.createOscillator();
    const oscGain = ctx.createGain();
    osc.type = 'triangle';
    osc.frequency.setValueAtTime(900 + Math.random() * 200, now);
    osc.frequency.exponentialRampToValueAtTime(120, now + 0.09);
    oscGain.gain.setValueAtTime(0.5, now);
    oscGain.gain.exponentialRampToValueAtTime(0.001, now + 0.11);
    osc.connect(oscGain);
    oscGain.connect(ctx.destination);
    osc.start(now);
    osc.stop(now + 0.12);

    // Short burst of filtered noise for a "snap"
    const bufferSize = ctx.sampleRate * 0.06;
    const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) {
      data[i] = (Math.random() * 2 - 1) * (1 - i / bufferSize);
    }
    const noise = ctx.createBufferSource();
    noise.buffer = buffer;
    const noiseFilter = ctx.createBiquadFilter();
    noiseFilter.type = 'highpass';
    noiseFilter.frequency.value = 800;
    const noiseGain = ctx.createGain();
    noiseGain.gain.setValueAtTime(0.35, now);
    noiseGain.gain.exponentialRampToValueAtTime(0.001, now + 0.06);
    noise.connect(noiseFilter);
    noiseFilter.connect(noiseGain);
    noiseGain.connect(ctx.destination);
    noise.start(now);
  }

  // ---- Rotating motivational quotes ----
  const quoteMsg = document.getElementById('quoteMsg');
  const quotes = [
    "It's almost time, Kat 🔑",
    "New floors, new memories ✨",
    "Home sweet home is on its way 🏡",
    "Every box you pack is a step closer",
    "This is really happening!",
    "Soon you'll be picking paint colors 🎨",
    "Your first house, your first chapter",
  ];
  let quoteIndex = 0;

  function showNextQuote() {
    quoteMsg.classList.remove('show');
    setTimeout(() => {
      quoteMsg.textContent = quotes[quoteIndex % quotes.length];
      quoteIndex++;
      quoteMsg.classList.add('show');
    }, 1000);
  }

  showNextQuote();
  setInterval(showNextQuote, 5000);

  // ---- Surprise button ----
  const surpriseBtn = document.getElementById('surpriseBtn');
  const surpriseOverlay = document.getElementById('surpriseOverlay');
  const surpriseClose = document.getElementById('surpriseClose');

  function openSurprise(){
    surpriseOverlay.classList.add('show');
  }
  function closeSurprise(){
    surpriseOverlay.classList.remove('show');
  }

  surpriseBtn.addEventListener('click', openSurprise);
  surpriseClose.addEventListener('click', closeSurprise);
  surpriseOverlay.addEventListener('click', (e) => {
    if (e.target === surpriseOverlay) closeSurprise();
  });
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeSurprise();
  });
</script>
